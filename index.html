<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dad Bot 2.0</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            background-color: #0b1a10;
            color: #f4f6f4;
            margin: 0;
            padding: 0;
            display: block;
            min-height: 100vh;
        }
        .page-wrapper {
            max-width: 600px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        .hero-section {
            text-align: center;
            margin-bottom: 30px;
        }
        .hero-image-container {
            width: 100%;
            max-width: 320px;
            margin: 0 auto 25px auto;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), 0 0 15px rgba(255, 210, 63, 0.2);
            border: 3px solid #ffd23f;
        }
        .hero-image {
            width: 100%;
            display: block;
        }
        h1 {
            font-size: 36pt;
            font-weight: 900;
            color: #ffd23f;
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 2px 3px 0px rgba(0,0,0,0.5);
        }
        .subtitle {
            font-size: 13pt;
            color: #a3c2ae;
            margin: 0 0 25px 0;
            line-height: 1.5;
        }
        .button-group {
            display: table;
            width: 100%;
            margin: 0 auto 35px auto;
            border-collapse: separate;
            border-spacing: 10px 0;
        }
        .button-cell {
            display: table-cell;
            width: 33.333%;
        }
        .button {
            display: block;
            text-align: center;
            background-color: #9e2a2b;
            color: #ffffff;
            text-decoration: none;
            padding: 12px 5px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 10.5pt;
            transition: background-color 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border-bottom: 3px solid #661a1b;
        }
        .button:hover {
            background-color: #b53132;
        }
        .card {
            background: #142d1c;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 40px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            border-left: 5px solid #3a86c8;
        }
        .card h2 {
            color: #ffd23f;
            font-size: 16pt;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255, 210, 63, 0.2);
            padding-bottom: 8px;
        }
        .card ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .card li {
            position: relative;
            padding-left: 30px;
            margin-bottom: 15px;
            font-size: 11.5pt;
            line-height: 1.5;
            color: #e2ede5;
        }
        .card li::before {
            content: "✓";
            position: absolute;
            left: 5px;
            top: 1px;
            color: #3a86c8;
            font-weight: bold;
            font-size: 13pt;
        }
        footer {
            text-align: center;
            font-size: 9.5pt;
            color: #648c71;
            margin-top: 20px;
            border-top: 1px solid rgba(100, 140, 113, 0.2);
            padding-top: 20px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
